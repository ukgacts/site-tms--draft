  <!-- Start Navbar -->
<header class="ampstart-headerbar">
  <!-- Logo left -->
  <a href="/" class="logo">
    TMS
    <!-- optional amp-img for logo -->
  </a>

  <!-- Nav + CTA wrapper -->
  <div class="header-right xs-hide sm-hide">
    <nav class="ampstart-headerbar-nav">
      <ul>
        {{ range .Site.Menus.main }}
          <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>

    <div class="header-cta">
      <a href="/blog">The Lab</a>
    </div>
  </div>

  <!-- Mobile hamburger -->
  <div role="button"
       on="tap:header-sidebar.toggle"
       tabindex="0"
       class="ampstart-navbar-trigger md-hide lg-hide">
    ☰
  </div>
</header>


    <!-- Start Sidebar -->
<amp-sidebar 
  id="header-sidebar" 
  class="ampstart-sidebar px3 flex flex-column md-hide lg-hide" 
  layout="nodisplay">


 <div class="sidebar-top">

<div class="sidebar-art">
    <a href="/">
    <div class="barcode-wrapper">
      <amp-img
        src="/img/barcode.png"
        width="210"
        height="113"
        layout="responsive"
        alt="barcode">
      </amp-img>
    </div>
  </a>
  
  
  
  <span class="text-label caps-tight">Home </span>
</div>
  <div class="ampstart-sidebar-header">
    <a href="#"
       on="tap:header-sidebar.toggle"
       class="ampstart-navbar-trigger">
       ✕
    </a>
  </div>

</div>

  <!-- NAVIGATION -->
  <nav class="ampstart-sidebar-nav ampstart-nav">

    {{ $currentPage := . }}

    {{ range .Site.Menus.main }}

      {{ if .HasChildren }}

        <ul class="list-reset m0 p0">
          <li class="ampstart-nav-item ampstart-nav-dropdown">

            <amp-accordion 
              layout="container" 
              disable-session-states 
              class="ampstart-dropdown">

              <section>
                <header>{{ .Name }}</header>

                <ul class="ampstart-dropdown-items list-reset m0 p0">
                  {{ range .Children }}
                    <li class="ampstart-dropdown-item">
                      <a href="{{ .URL }}">
                        {{ .Name }}
                      </a>
                    </li>
                  {{ end }}
                </ul>

              </section>

            </amp-accordion>

          </li>
        </ul>

      {{ else }}

        <!-- SINGLE LINK -->
        <a href="{{ .URL }}" 
           class="block h5  ">
          {{ .Name }}
        </a>

      {{ end }}

    {{ end }}

    <!-- OPTIONAL CTA (SAFE ADDITION) -->




  </nav>

</amp-sidebar>
    <!-- End Sidebar -->
    <!-- End Navbar -->
