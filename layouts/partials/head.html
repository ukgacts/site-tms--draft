.cta-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;

  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;

  color: #111;
  text-decoration: none;
  position: relative;
}

/* Underline animation (FIXED) */
.cta-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -3px;

  width: 100%;
  height: 1px;

  background: currentColor;
  transform: scaleX(0.4);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.cta-link:hover::after {
  transform: scaleX(1);
}

/* Arrow */
.arrow {
  transition: transform 0.25s ease;
}

.cta-link:hover .arrow {
  transform: translate(4px, -4px);
}

/* ===============================
   STORY CIRCLES SECTION
=============================== */



/* ORBIT CIRCLES */

.orbit-section{
position:relative;
height:500px;
overflow:hidden;
background:#f7f9fb;
}

.orbit-container{
position:absolute;
width:100%;
height:100%;
}








.orbit-stories{
position:relative;
height:850px;
overflow:hidden;

/* light gradient background */
background:linear-gradient(
180deg,
#f4fbfb 0%,
#eef7ff 100%
);
}

/* STAGE */

.orbit-stage{
position:relative;
width:100%;
height:100%;
}

/* ORBIT CONTAINER */

.orbit{
position:absolute;
text-align:center;
animation:orbitFloat linear infinite;
}

/* POSITIONS */

.orbit--1{
top:120px;
left:8%;
animation-duration:14s;
}

.orbit--2{
top:160px;
left:65%;
animation-duration:12s;
}

.orbit--3{
top:350px;
left:40%;
animation-duration:16s;
}

.orbit--4{
top:420px;
left:15%;
animation-duration:13s;
}

/* STORY CIRCLE */

.orbit-story{

width:240px;
height:240px;

border-radius:50%;
padding:6px;

background:linear-gradient(
135deg,
#00c6ff,
#0072ff
);

box-shadow:0 10px 30px rgba(0,0,0,.08);

overflow:hidden;
transition:.3s;
}

.orbit-story amp-img,
.orbit-story amp-img img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

/* FEATURED */

.orbit-story--featured{
width:300px;
height:300px;
background:linear-gradient(
135deg,
#1db954,
#00ffa3
);

box-shadow:
0 0 20px rgba(29,185,84,.35);

animation:orbitPulse 3s infinite;
}

/* LABEL */

.orbit-label{
display:block;
margin-top:10px;
font-size:14px;
font-weight:500;
color:#333;
}

/* FLOAT MOTION */

@keyframes orbitFloat{

0%{transform:translateY(0)}

50%{transform:translateY(-35px)}

100%{transform:translateY(0)}

}

/* FEATURE PULSE */

@keyframes orbitPulse{

0%{transform:scale(1)}

50%{transform:scale(1.06)}

100%{transform:scale(1)}

}

/* INTERACTION */

.orbit a:active{
transform:scale(.95);
}

/* ===============================
   SERVICES — ZIG ZAG LAYOUT
=============================== */

.services-zigzag {
  display: flex;
  flex-direction: column;
  gap: var(--space-10);
  margin-top: var(--space-7);
}

/* Row */
.service-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-8);
  align-items: center;
}

/* Reverse layout */
.service-row.reverse {
  direction: rtl;
}
.service-row.reverse .service-text {
  direction: ltr;
}

/* Text */
.service-text {
  max-width: 520px;
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.service-text h3 {
  font-family: var(--font-serif);
  font-size: 32px;
  line-height: 1.1;
}

/* Media block (visual placeholder) */
.service-media {
  width: 100%;
  aspect-ratio: 4 / 3;
  background: #f5f3f1;
  border-radius: 16px;
}

/* subtle hover polish */
.service-row:hover .service-media {
  transform: translateY(-4px);
  transition: 0.3s ease;
}


.service-media {
  background: linear-gradient(135deg, #c7dedd, #0e4d4a);
  opacity: 0.9;
}
/* ===============================
   MOBILE
=============================== */

@media (max-width: 768px) {

  .services-zigzag {
    gap: var(--space-7);
  }

  .service-row {
    grid-template-columns: 1fr;
    gap: var(--space-4);
  }

  /* remove zig-zag on mobile */
  .service-row.reverse {
    direction: ltr;
  }

  .service-text h3 {
    font-size: 26px;
  }

  .service-media {
    order: 2;
  }

}






















/* ===============================
   TECHNOLOGY SECTION
=============================== */
.section-tech {
  background: #f5f3f1;
  position: relative;
  overflow: hidden;
}

/* subtle brand accent */
.section-tech::after {
  content: "";
  position: absolute;
  right: -10%;
  top: 50%;
  transform: translateY(-50%);
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #c7dedd 0%, transparent 70%);
  opacity: 0.35;
  pointer-events: none;
}

/* centered layout */
.tech-centered {
  max-width: 640px;
  margin: 0 auto;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: var(--space-5);
}

/* tighter rhythm */
.tech-centered .text-body {
  max-width: 58ch;
  margin-left: auto;
  margin-right: auto;
}

/* improve hierarchy */
.tech-centered .display-sm {
  margin-bottom: var(--space-2);
  font-size: clamp(40px, 5vw, 64px);
  letter-spacing: -0.02em;
}

/* technology stack badges */
.tech-stack {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  margin-top: var(--space-4);
}

.tech-stack span {
  font-size: clamp(12px, 1vw, 14px); /* slightly responsive for mobile */
  letter-spacing: 0.08em;
  padding: 6px 10px;
  border: 1px solid rgba(0, 0, 0, 0.1);
  border-radius: 999px;
}

/* MOBILE STYLES */
@media (max-width: 768px) {
  .section-tech::after {
    right: -30%;
    width: 300px;
    height: 300px;
    opacity: 0.25;
  }

  .tech-centered {
    gap: var(--space-4);
  }
}
