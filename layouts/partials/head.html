 letter-spacing: 0.02em;

/* LEFT */

/* LINKS */
.cta-links {
  display: flex;
  flex-direction: column;
  gap: 24px;
  margin-top: var(--space-5);
}

.cta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* LINK */
.cta-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;

  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;

  color: #111;
  text-decoration: none;
  position: relative;
}

/* Underline animation (FIXED) */
.cta-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -3px;

  width: 100%;
  height: 1px;

  background: currentColor;
  transform: scaleX(0.4);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.cta-link:hover::after {
  transform: scaleX(1);
}

/* Arrow */
.arrow {
  transition: transform 0.25s ease;
}

.cta-link:hover .arrow {
  transform: translate(4px, -4px);
}

/* Note */
.cta-note {
  font-size: 14px;
  color: #777;
  margin: 0;
}

/* ---------- RESPONSIVE ---------- */

@media (max-width: 900px) {
  .cta-grid {
    grid-template-columns: 1fr;
    gap: 60px;
  }

  .cta-title {
    font-size: 80px;

  .cta-right {
    padding-top: 0;
  }
}

@media (max-width: 600px) {

=============================== */



/* ORBIT CIRCLES */

.orbit-section{
position:relative;
height:500px;
overflow:hidden;
background:#f7f9fb;
}

.orbit-container{
position:absolute;
width:100%;
height:100%;
}








.orbit-stories{
position:relative;
height:850px;
overflow:hidden;

/* light gradient background */
background:linear-gradient(
180deg,
#f4fbfb 0%,
#eef7ff 100%
);
}

/* STAGE */

.orbit-stage{
position:relative;
width:100%;
height:100%;
}

/* ORBIT CONTAINER */

.orbit{
position:absolute;
text-align:center;
animation:orbitFloat linear infinite;
}

/* POSITIONS */

.orbit--1{
top:120px;
left:8%;
animation-duration:14s;
}

.orbit--2{
top:160px;
left:65%;
animation-duration:12s;
}

.orbit--3{
top:350px;
left:40%;
animation-duration:16s;
}

.orbit--4{
top:420px;
left:15%;
animation-duration:13s;
}

/* STORY CIRCLE */

.orbit-story{

width:240px;
height:240px;

border-radius:50%;
padding:6px;

background:linear-gradient(
135deg,
#00c6ff,
#0072ff
);

box-shadow:0 10px 30px rgba(0,0,0,.08);

overflow:hidden;
transition:.3s;
}

.orbit-story amp-img,
.orbit-story amp-img img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

/* FEATURED */

.orbit-story--featured{
width:300px;
height:300px;
background:linear-gradient(
135deg,
#1db954,
#00ffa3
);

box-shadow:
0 0 20px rgba(29,185,84,.35);

animation:orbitPulse 3s infinite;
}

/* LABEL */

.orbit-label{
display:block;
margin-top:10px;
font-size:14px;
font-weight:500;
color:#333;
}

/* FLOAT MOTION */

@keyframes orbitFloat{

0%{transform:translateY(0)}

50%{transform:translateY(-35px)}

100%{transform:translateY(0)}

}

/* FEATURE PULSE */

@keyframes orbitPulse{

0%{transform:scale(1)}

50%{transform:scale(1.06)}

100%{transform:scale(1)}

}

/* INTERACTION */

.orbit a:active{
transform:scale(.95);
}

  position: absolute;

  left: 50%;

  border-radius: 50%;

}
