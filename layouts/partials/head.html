.orbit--1{

padding:6px;

);

box-shadow:0 10px 30px rgba(0,0,0,.08);

overflow:hidden;
transition:.3s;
}

.orbit-story amp-img,
.orbit-story amp-img img{
width:100%;
height:100%;

}

.orbit-story--featured{
width:300px;

135deg,

#00ffa3
);

box-shadow:
0 0 20px rgba(29,185,84,.35);

animation:orbitPulse 3s infinite;
}

.orbit-label{
display:block;

}

@keyframes orbitFloat{

0%{transform:translateY(0)}

50%{transform:translateY(-35px)}

100%{transform:translateY(0)}

}

/* FEATURE PULSE */

@keyframes orbitPulse{

0%{transform:scale(1)}

50%{transform:scale(1.06)}

100%{transform:scale(1)}

}

/* INTERACTION */

.orbit a:active{
transform:scale(.95);
}
