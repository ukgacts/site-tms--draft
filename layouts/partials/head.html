.cta-grid {

/* LEFT */
.cta-title {
  font-family: 'Cormorant Garamond', serif;

  font-size: 18px;

}

/* LINKS */
.cta-links {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.cta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* LINK */
.cta-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;

  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;

  color: #111;
  text-decoration: none;
  position: relative;
}

/* Underline animation (FIXED) */
.cta-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -3px;

  width: 100%;
  height: 1px;

  background: currentColor;
  transform: scaleX(0.4);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.cta-link:hover::after {
  transform: scaleX(1);
}

/* Arrow */
.arrow {
  transition: transform 0.25s ease;
}

.cta-link:hover .arrow {
  transform: translate(4px, -4px);
}

/* Note */
.cta-note {
  font-size: 14px;
  color: #777;
  margin: 0;
}

/* ---------- RESPONSIVE ---------- */

@media (max-width: 900px) {
  .cta-grid {
    grid-template-columns: 1fr;
    gap: 60px;
  }

  .cta-title {
    font-size: 80px;
  }

  .cta-right {

  }
}

  }
