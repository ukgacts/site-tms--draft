<amp-animation id="animDrift" layout="nodisplay">
<script type="application/json">
{
  "animations": [
    {
      "selector": ".image-container",
      "keyframes": [
        { "transform": "translate(0,0)" },
        { "transform": "translate(100px,100px)" }
      ],
      "duration": "3s",
      "fill": "both",
      "easing": "ease-out"
    }
  ]
}
