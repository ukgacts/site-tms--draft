<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body>

  {{ partial "header.html" . }}

  <section class="hero-base">

<div class="hero-base-top"></div>

<div class="hero-base-inner container-new">

<p class="hero-base-tag">ATMOSPHERE BY DESIGN</p>

<h1 class="hero-base-title">BASE.</h1>

<p class="hero-base-subtitle">THE SOUND OF THE BRAND</p>

<p class="hero-base-side">
ARTISTRY MEETS<br>
ARCHITECTURE
</p>

</div>

<amp-img
src="/img/houses.png"
width="1348"
height="649"
layout="responsive"
class="hero-base-building"
alt="Buildings">
</amp-img>

<div class="hero-base-circles">
<div class="hero-base-circle hero-base-circle-big"></div>
<div class="hero-base-circle hero-base-circle-mid"></div>
<div class="hero-base-circle hero-base-circle-small"></div>
</div>

<amp-img
src="/img/barcode.png"
width="210"
height="113"
layout="responsive"
class="hero-base-barcode"
alt="barcode">
</amp-img>

</section>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

</body>
</html>
